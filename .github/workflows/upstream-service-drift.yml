name: upstream-service-drift

on:
  schedule:
    - cron: '17 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.47.2'
      - name: Update upstream service pin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-upstream-service-pin.sh
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-upstream-service-pin
          delete-branch: true
          title: "chore: update upstream Signal service pin"
          commit-message: "chore: update upstream Signal service pin"
          body: |
            Automated refresh of selected signalapp/libsignal service protos.

            Verification run by this workflow:
            - scripts/fetch-upstream-protos.sh
            - buf generate
            - go test ./... -count=1
      - name: Enable automerge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash
