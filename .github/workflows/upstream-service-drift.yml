name: upstream-service-drift

on:
  schedule:
    - cron: '17 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.47.2'
      - name: Check upstream service pin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-upstream-service-pin.sh --check-only

